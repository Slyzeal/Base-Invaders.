<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Generate Splash</title>
  <style>
    body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: white; gap: 20px; }
    canvas { border: 2px solid #444; }
    button { background: #0066ff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #0044cc; }
  </style>
</head>
<body>
  <canvas id="c" width="200" height="200"></canvas>
  <button onclick="download()">Download splash.png</button>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    // Background
    ctx.fillStyle = "#010108";
    ctx.fillRect(0, 0, 200, 200);

    // Glow effect
    const glow = ctx.createRadialGradient(100, 100, 10, 100, 100, 90);
    glow.addColorStop(0, "rgba(0, 100, 255, 0.3)");
    glow.addColorStop(1, "transparent");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 200, 200);

    // Draw rocket/ship shape
    ctx.save();
    ctx.translate(100, 85);

    // Ship body
    const hg = ctx.createLinearGradient(-18, -30, 18, 30);
    hg.addColorStop(0, "#c4dcff");
    hg.addColorStop(0.4, "#4a86cc");
    hg.addColorStop(0.8, "#1a3e88");
    hg.addColorStop(1, "#091e50");
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.bezierCurveTo(12, -12, 14, 5, 12, 18);
    ctx.lineTo(18, 28);
    ctx.lineTo(14, 36);
    ctx.lineTo(-14, 36);
    ctx.lineTo(-18, 28);
    ctx.lineTo(-12, 18);
    ctx.bezierCurveTo(-14, 5, -12, -12, 0, -30);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(130,180,255,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();

    // Cockpit
    const ck = ctx.createRadialGradient(-3, -10, 1, 0, -6, 9);
    ck.addColorStop(0, "#eef8ff");
    ck.addColorStop(0.5, "#66aaee");
    ck.addColorStop(1, "rgba(0,18,80,0.9)");
    ctx.fillStyle = ck;
    ctx.beginPath();
    ctx.ellipse(0, -6, 7, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing left
    ctx.fillStyle = "#1a5ab0";
    ctx.beginPath();
    ctx.moveTo(-12, 14);
    ctx.lineTo(-22, 24);
    ctx.lineTo(-18, 36);
    ctx.lineTo(-10, 34);
    ctx.lineTo(-8, 24);
    ctx.closePath();
    ctx.fill();

    // Wing right
    ctx.beginPath();
    ctx.moveTo(12, 14);
    ctx.lineTo(22, 24);
    ctx.lineTo(18, 36);
    ctx.lineTo(10, 34);
    ctx.lineTo(8, 24);
    ctx.closePath();
    ctx.fill();

    // Flame
    const flame = ctx.createLinearGradient(0, 36, 0, 58);
    flame.addColorStop(0, "rgba(255, 220, 80, 1)");
    flame.addColorStop(0.5, "rgba(255, 100, 10, 0.85)");
    flame.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = flame;
    ctx.beginPath();
    ctx.moveTo(-8, 36);
    ctx.bezierCurveTo(-6, 48, 6, 48, 8, 36);
    ctx.lineTo(0, 58);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Stars
    const stars = [];
    for (let i = 0; i < 30; i++) {
      stars.push({
        x: Math.random() * 200,
        y: Math.random() * 200,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random() * 0.8 + 0.2
      });
    }
    stars.forEach(s => {
      ctx.globalAlpha = s.a;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Text: BASE BUGS
    ctx.fillStyle = "rgba(0,80,200,0.0)";
    ctx.fillRect(0, 148, 200, 52);

    ctx.textAlign = "center";
    ctx.fillStyle = "#aaccff";
    ctx.font = "bold 13px 'Arial', sans-serif";
    ctx.letterSpacing = "3px";
    ctx.fillText("BASE BUGS", 100, 168);

    ctx.fillStyle = "rgba(100,160,255,0.5)";
    ctx.font = "9px 'Arial', sans-serif";
    ctx.fillText("Loading...", 100, 184);

    function download() {
      const link = document.createElement("a");
      link.download = "splash.png";
      link.href = c.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
